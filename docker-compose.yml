services:
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:3000
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - BACKEND_PORT=3000
      - AI_SERVICE_URL=http://ai-service:8000
      - MAX_FILE_SIZE=10485760
      - JWT_ACCESS_SECRET=dev_access_secret_change_in_production
      - JWT_REFRESH_SECRET=dev_refresh_secret_change_in_production
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    depends_on:
      - ai-service

  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - AI_SERVICE_PORT=8000
      - MODEL_PATH=./models/efficientnet_b3_nih_final.pth
      - MODEL_VERSION=v3.0.0
    volumes:
      - ./apps/ai-service:/app
      - C:/nih_training/efficientnet_b3_nih_final.pth:/app/models/efficientnet_b3_nih_final.pth:ro

networks:
  default:
    name: bioai-network
